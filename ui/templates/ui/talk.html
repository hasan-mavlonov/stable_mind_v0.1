{% extends "ui/base.html" %}

{% block content %}
<section class="mx-auto max-w-4xl rounded-2xl border border-slate-800 bg-slate-900 p-8">
    <h1 class="text-2xl font-bold">Talk with StableMind</h1>
    <p class="mt-2 text-slate-300">Ask Rin about existing beliefs and memory.</p>

    <form method="post" class="mt-6 space-y-3">
        {% csrf_token %}
        <textarea class="min-h-40 w-full rounded-lg border border-slate-700 bg-slate-950 p-3 text-slate-100 outline-none ring-cyan-400 focus:ring" name="message" placeholder="Type your message...">{% if user_text %}{{ user_text }}{% endif %}</textarea>
        <button class="rounded-lg bg-cyan-500 px-4 py-2 font-semibold text-slate-950 hover:bg-cyan-400" type="submit">Send</button>
    </form>

    {% if error %}
        <div class="mt-6 rounded-lg border border-rose-500/30 bg-rose-500/10 p-3 text-rose-300">{{ error }}</div>
    {% endif %}

    {% if answer %}
        <div class="mt-6 space-y-4">
            <div class="rounded-xl border border-slate-700 bg-slate-950 p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-cyan-300">You</h2>
                <p class="mt-1 whitespace-pre-wrap">{{ user_text }}</p>
            </div>
            <div class="rounded-xl border border-slate-700 bg-slate-950 p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-cyan-300">Rin</h2>
                <p class="mt-1 whitespace-pre-wrap">{{ answer }}</p>
            </div>
        </div>
    {% endif %}
</section>
{% endblock %}
